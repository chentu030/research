<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 個股研究報告</title>
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
<div class="container">
<div class="nav-bar">
  <label>📅 清單</label>
  <div class="custom-select" id="customListSelect">
    <div class="select-selected" id="selectSelected">選擇清單...</div>
    <div class="select-items" id="selectItems">
      <div class="select-search">
        <input type="text" id="selectSearchInput" placeholder="搜尋清單..." autocomplete="off">
      </div>
      <div class="select-options-container" id="selectOptionsContainer">
        <div class="select-item" data-url="新增資料夾/index.html">新增資料夾</div>
      </div>
    </div>
  </div>
  <div class="search-box">
    <input type="text" id="stockSearch" placeholder="搜尋股票代碼或名稱..." oninput="globalSearch()" onfocus="globalSearch()" autocomplete="off">
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    var selected = document.getElementById("selectSelected");
    var itemsList = document.getElementById("selectItems");
    var searchInput = document.getElementById("selectSearchInput");
    var optionsContainer = document.getElementById("selectOptionsContainer");
    var optionDivs = optionsContainer.getElementsByClassName("select-item");

    selected.addEventListener("click", function(e) {
        e.stopPropagation();
        this.classList.toggle("select-arrow-active");
        itemsList.classList.toggle("select-show");
        if (itemsList.classList.contains("select-show")) {
            searchInput.focus();
            searchInput.value = '';
            filterOptions('');
        }
    });

    for (var i = 0; i < optionDivs.length; i++) {
        optionDivs[i].addEventListener("click", function(e) {
            window.location.href = this.getAttribute("data-url");
        });
    }

    searchInput.addEventListener("input", function() {
        filterOptions(this.value.toLowerCase());
    });

    searchInput.addEventListener("click", function(e) {
        e.stopPropagation();
    });

    function filterOptions(filter) {
        for (var i = 0; i < optionDivs.length; i++) {
            var txtValue = optionDivs[i].textContent || optionDivs[i].innerText;
            if (txtValue.toLowerCase().indexOf(filter) > -1) {
                optionDivs[i].style.display = "";
            } else {
                optionDivs[i].style.display = "none";
            }
        }
    }

    document.addEventListener("click", function(e) {
        if (!itemsList.contains(e.target) && e.target !== selected) {
            selected.classList.remove("select-arrow-active");
            itemsList.classList.remove("select-show");
        }
    });
});
</script>
<script>window.location.href="新增資料夾/index.html";</script><p>正在跳轉到最新報告... <a href="新增資料夾/index.html">點此前往</a></p>
</div>
<script>window.ROOT_PATH = "";</script>
<script src="search_index.js"></script>
<footer class="site-footer">
<p>本站報告由 AI 自動產生，僅供參考，不構成投資建議。</p>
<p>最後更新：2026-03-11 23:46</p>
</footer>
</body>
</html>
